name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: node --check game.js && node --check sw.js
      - name: Headless smoke test
        run: node tests/smoke.js
      - name: Mechanics test
        run: node tests/mechanics.js
